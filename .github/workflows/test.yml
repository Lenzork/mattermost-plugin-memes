name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.19'
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Build manifest tool
      run: cd build/manifest && go build -o ../bin/manifest

    - name: Build deploy tool  
      run: cd build/deploy && go build -o ../bin/deploy

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: v1.54.2
        args: --timeout=10m --issues-exit-code=0

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./server/...

    - name: Generate coverage report
      run: go tool cover -html=coverage.out -o coverage.html

    - name: Upload coverage to artifacts
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: |
          coverage.out
          coverage.html

    - name: Build server
      run: |
        mkdir -p server/dist
        cd server && go build -o dist/plugin-linux-amd64

    - name: Verify plugin can be bundled
      run: make dist